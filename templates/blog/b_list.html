<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>BlogFlow | Horizontal Blog Manager</title>
  <!-- Tailwind CSS v3 (no custom JS) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- tiny extra style to ensure consistent row behavior, no JS -->
  <style>
    /* simple focus ring accessibility – no interactive scripts */
    button, a { cursor: pointer; user-select: none; }
    button:focus-visible, a:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    /* line-clamp fallback for titles on narrow screens */
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    @media (max-width: 640px) {
      .mobile-stack-row { flex-direction: column !important; align-items: stretch !important; gap: 1rem; }
      .mobile-stack-row .blog-img { width: 100% !important; height: 160px !important; }
      .mobile-stack-row .blog-actions { justify-content: flex-start !important; margin-top: 0.5rem; }
    }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
    
    <!-- Header section: Back + Add Blog buttons (horizontal layout, pure UI) -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8 pb-3 border-b border-gray-200">
      <!-- Back button (static placeholder) -->
       <a  href="{% url 'dashboard' %}">
      <button class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-white border border-gray-300 text-gray-700 font-semibold shadow-sm hover:bg-gray-50 hover:shadow transition duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
    </a>
      
      <!-- Add Blog button (static demo) -->
       <a href="{% url 'blog_add'%}">
      <button class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md transition hover:shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add Blog
      </button>
    </div>
  </a>

    <!-- Page heading -->
    <div class="mb-7">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-800">📰 Blog Directory</h1>
      
    </div>

    <!-- BLOG LIST: horizontal rows (each row = image + title + button group) -->
    <div class="space-y-5">
      
      <!-- Blog row 1 -->
       {% for blog in blogs %}
      <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hover:shadow-lg transition-all duration-200">
        <div class="flex flex-wrap items-center gap-4 p-4 md:p-5 mobile-stack-row">
          <!-- Image block -->
          <div class="blog-img w-24 h-24 md:w-28 md:h-28 flex-shrink-0 rounded-lg overflow-hidden bg-gray-200 shadow-sm">
            <img class="w-full h-full object-cover" src="{{blog.img.url}}" alt="mountain digital nomad" loading="lazy">
          </div>
          <!-- Title block -->
          <div class="flex-grow min-w-[160px]">
            <h2 class="text-lg md:text-xl font-bold text-gray-800 leading-tight line-clamp-1">{{blog.title}}</h2>
            <p class="text-xs text-gray-400 mt-1 hidden sm:block">{{blog.desc}}</p>
          </div>
          <!-- Buttons group: Details, Update, Delete -->
          <div class="blog-actions flex flex-wrap gap-2 justify-end ml-auto">
           <a href="{% url 'blog_details' blog.id %}"> <button class="bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Details</button><a/>
            <a href="{% url 'blog_update' blog.id %}"><button class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Update</button></a>
            <a href="{% url 'blog_delete' blog.id %}"><button class="bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Delete</button></a>
          </div>
        </div>
      </div>
      {% endfor %}


  </main>
</body>
</html>
