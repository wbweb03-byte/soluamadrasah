<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AuthorityHub | Manage Authorities</title>
  <!-- Tailwind CSS v3 (no JavaScript) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* No JS — pure UI and accessibility enhancements */
    button, a { cursor: pointer; user-select: none; }
    button:focus-visible, a:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    /* responsive stacking for mobile */
    @media (max-width: 640px) {
      .mobile-stack-row { flex-direction: column !important; align-items: stretch !important; gap: 0.75rem; }
      .mobile-stack-row .authority-img { width: 100% !important; height: 100px !important; }
      .mobile-stack-row .authority-actions { justify-content: flex-start !important; margin-top: 0.25rem; }
    }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
    
    <!-- Header: Back + Add Authority buttons -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8 pb-3 border-b border-gray-200">
      <!-- Back button (static placeholder) -->
       <a href="{% url "dashboard" %}">
      <button class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-white border border-gray-300 text-gray-700 font-semibold shadow-sm hover:bg-gray-50 hover:shadow transition duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
    </a>
      
      <!-- Add Authority button -->
       <a href="{% url "authority_add" %}">
      <button class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md transition hover:shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add Authority
      </button>
    </div>
  </a>

    <!-- Page heading -->
    <div class="mb-7">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-800">🏛️ Authorities Directory</h1>
      
    </div>

    <!-- AUTHORITIES LIST: horizontal rows (image + authority name/title + is_active badge + action buttons) -->
    <div class="space-y-5">
      
      <!-- Authority 1 (Active) -->
       {%for authority in authorities %}
      <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hover:shadow-lg transition-all duration-200">
        <div class="flex flex-wrap items-center gap-4 p-4 md:p-5 mobile-stack-row">
          <div class="authority-img w-24 h-24 md:w-28 md:h-28 flex-shrink-0 rounded-lg overflow-hidden bg-gray-200">
            <img class="w-full h-full object-cover" src="{{ authority.img.url}}" alt="Chief Commissioner" loading="lazy">
          </div>
          <div class="flex-grow min-w-[160px]">
            <div class="flex items-center gap-2 flex-wrap">
              <h2 class="text-lg md:text-xl font-bold text-gray-800 line-clamp-1">{{authority.name}}</h2>
              <span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700 border border-green-200">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                {% if authority.is_active%}Active{% else %} Inactive {% endif %}
              </span>
            </div>
            <p class="text-xs text-gray-400 mt-1 hidden sm:block">{{authority.position}}</p>
          </div>
          <div class="authority-actions flex flex-wrap gap-2 justify-end ml-auto">
            <a href="{% url 'authority_details' authority.id %}"> <button  class="bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Details</button></a>
            <a href="{% url 'authority_update' authority.id %}"><button class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Update</button></a>
            <button class="bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Delete</button>
          </div>
        </div>
      </div>
      {% endfor %}


  </main>
</body>
</html>
