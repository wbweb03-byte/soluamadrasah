<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden">
        
        <!-- Profile Image -->
        <div class="flex justify-center pt-6">
           
                <img src="{{ authority.img.url }}" alt="{{ authority.name }}" 
                     class="w-32 h-32 rounded-full object-cover border-4 border-gray-200">
            
        </div>

        <!-- authority Info -->
        <div class="p-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">{{ authority.name }}</h2>
            
            <div class="mt-4 text-left space-y-2">
                <p class="text-gray-700">
                    <span class="font-semibold">Qualification:</span> 
                    {{ authority.qualification|default:"Not specified" }}
                </p>
                <p class="text-gray-700">
                    <span class="font-semibold">Position:</span> 
                    {{ authority.position|default:"Not specified" }}
                </p>
            </div>

            <!-- Back Button -->
            <div class="mt-6">
                <a href="{% url 'authority_list' %}" 
                   class="inline-block bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
