{%extends "admin/base.html"%}
{% block content%}
<html lang="en">
<body class="bg-gray-100">

<div class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden">
        
        <!-- Profile Image -->
        <div class="flex justify-center pt-6">
           
                <img src="{{ teacher.img.url }}" alt="{{ teacher.name }}" 
                     class="w-32 h-32 rounded-full object-cover border-4 border-gray-200">
            
        </div>

        <!-- Teacher Info -->
        <div class="p-6 text-center">
            <h2 class="text-2xl font-bold text-gray-800">{{ teacher.name }}</h2>
            
            <div class="mt-4 text-left space-y-2">
                <p class="text-gray-700">
                    <span class="font-semibold">Qualification:</span> 
                    {{ teacher.qualification|default:"Not specified" }}
                </p>
                <p class="text-gray-700">
                    <span class="font-semibold">Position:</span> 
                    {{ teacher.position|default:"Not specified" }}
                </p>
            </div>

            <!-- Back Button -->
            <div class="mt-6">
                <a href="{% url 'dashboard' %}" 
                   class="inline-block bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-4 rounded">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>

</body>
{% endblock%}
