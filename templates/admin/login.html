<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Madrasah Management System</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-100 to-blue-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md p-8">
        <div class="bg-white shadow-2xl rounded-2xl p-8">

            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-indigo-700">
                    Madrasah Management
                </h1>
                <p class="text-gray-500 mt-2">
                    Sign in to your account
                </p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 p-3 rounded-lg bg-red-100 text-red-700">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Username
                    </label>
                    <input
                        type="text"
                        name="username"
                        placeholder="Enter username"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">
                        Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Enter password"
                        required
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-300"
                >
                    Login
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                © {% now "Y" %} Madrasah Management System
            </div>

        </div>
    </div>

</body>
</html>
