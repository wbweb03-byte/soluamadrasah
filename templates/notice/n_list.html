<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NoticeBoard | Horizontal Notice Manager</title>
  <!-- Tailwind CSS v3 (no JavaScript) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* No JS — only visual & accessibility enhancements */
    button, a { cursor: pointer; user-select: none; }
    button:focus-visible, a:focus-visible { outline: 2px solid #3b82f6; outline-offset: 2px; }
    /* responsive: stack rows vertically on small screens */
    @media (max-width: 640px) {
      .mobile-stack-row { flex-direction: column !important; align-items: stretch !important; gap: 0.75rem; }
      .mobile-stack-row .notice-img { width: 100% !important; height: 100px !important; }
      .mobile-stack-row .notice-actions { justify-content: flex-start !important; margin-top: 0.25rem; }
    }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-50 font-sans antialiased">

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-10">
    
    <!-- Header: Back + Add Notice (pure UI, no JS) -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8 pb-3 border-b border-gray-200">
      <!-- Back button -->
       <a href="{% url 'dashboard' %}">
      <button class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-white border border-gray-300 text-gray-700 font-semibold shadow-sm hover:bg-gray-50 hover:shadow transition duration-200">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4.5 w-4.5" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </button>
    </a>
      
      <!-- Add Notice button -->
       <a href="{% url 'notice_add' %}">
      <button class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-md transition hover:shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Add Notice
      </button>
    </div>
  </a>

    <!-- Page heading -->
    <div class="mb-7">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-gray-800">📢 Notice Board</h1>
      <p class="text-gray-500 mt-1 text-sm">Horizontal list — image, title & management buttons (static UI, no JavaScript)</p>
    </div>

    <!-- NOTICE LIST: horizontal rows (image + title + action buttons) -->
    <div class="space-y-5">
      
      <!-- Notice row 1 -->
       {% for notice in notices %}
      <div class="bg-white rounded-xl shadow-md border border-gray-100 overflow-hidden hover:shadow-lg transition-all duration-200">
        <div class="flex flex-wrap items-center gap-4 p-4 md:p-5 mobile-stack-row">
          
          <div class="flex-grow min-w-[160px]">
            <h2 class="text-lg md:text-xl font-bold text-gray-800 line-clamp-1">📌 {{notice.title}}</h2>
            <p class="text-xs text-gray-400 mt-1 hidden sm:block">{{notice.desc}}</p>
          </div>
          <div class="notice-actions flex flex-wrap gap-2 justify-end ml-auto">
            <a href="{% url 'notice_details' notice.id %}"><button class="bg-sky-600 hover:bg-sky-700 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Details</button></a>
            <a href="{% url 'notice_update' notice.id %}"><button class="bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Update</button></a>
            <a href="{% url 'notice_delete' notice.id %}"><button class="bg-rose-500 hover:bg-rose-600 text-white text-sm font-medium px-4 py-2 rounded-lg shadow-sm transition">Delete</button></a>
          </div>
        </div>
      </div>
      {% endfor %}

    

  </main>
</body>
</html>
